<script>
    let secondsLeft = 10;
    const countdownAr = document.getElementById('countdown-ar');
    const countdownEn = document.getElementById('countdown-en');
    const evaluationSteps = [
        document.getElementById('evaluation-step-0'),
        document.getElementById('evaluation-step-1'),
        document.getElementById('evaluation-step-2')
    ];
    const evaluationIcons = [
        document.getElementById('evaluation-icon-0'),
        document.getElementById('evaluation-icon-1'),
        document.getElementById('evaluation-icon-2')
    ];
    const stepDuration = 10 / evaluationSteps.length;

    function setStepStatus(index, status) {
        const step = evaluationSteps[index];
        const icon = evaluationIcons[index];
        const title = step.querySelector('[dir="rtl"]');
        const caption = title.nextElementSibling;

        step.classList.remove('step-complete', 'step-active', 'step-upcoming');
        step.classList.add(`step-${status}`);

        if (status === 'complete') {
            title.className = 'font-label-caps text-label-caps text-on-surface';
            caption.className = 'font-caption text-caption text-on-surface-variant';
            icon.className = 'material-symbols-outlined text-secondary relative z-10';
            icon.style.fontVariationSettings = "'FILL' 1";
            icon.textContent = 'check_circle';
            return;
        }

        icon.style.fontVariationSettings = '';

        if (status === 'active') {
            title.className = 'font-label-caps text-label-caps text-primary font-bold';
            caption.className = 'font-caption text-caption text-primary/80';
            icon.className = 'material-symbols-outlined text-primary animate-spin relative z-10';
            icon.textContent = 'progress_activity';
            return;
        }

        title.className = 'font-label-caps text-label-caps text-on-surface-variant';
        caption.className = 'font-caption text-caption text-outline';
        icon.className = 'material-symbols-outlined text-outline-variant relative z-10';
        icon.textContent = 'radio_button_unchecked';
    }

    function updateEvaluationSteps() {
        const elapsedSeconds = 10 - secondsLeft;

        evaluationSteps.forEach((_, index) => {
            if (secondsLeft <= 0 || elapsedSeconds >= stepDuration * (index + 1)) {
                setStepStatus(index, 'complete');
            } else if (elapsedSeconds >= stepDuration * index) {
                setStepStatus(index, 'active');
            } else {
                setStepStatus(index, 'upcoming');
            }
        });
    }

    updateEvaluationSteps();

    const countdownTimer = window.setInterval(() => {
        secondsLeft -= 1;
        countdownAr.textContent = secondsLeft;
        countdownEn.textContent = secondsLeft;
        updateEvaluationSteps();

        if (secondsLeft <= 0) {
            window.clearInterval(countdownTimer);
            document.body.classList.add('page-leaving');
            window.setTimeout(() => {
                window.location.href = 'EvaluationDashboardInterviewCoach.html';
            }, 450);
        }
    }, 1000);
</script>
