<script>
        function getCheckedValue(name, fallback) {
            const checked = document.querySelector(`input[name="${name}"]:checked`);
            return checked ? checked.value : fallback;
        }

        function startInterviewWithSetup() {
            const companyLabels = {
                riyad: "Riyad Bank",
                aramco: "Aramco",
                stc: "STC"
            };
            const trackLabels = {
                technical: "Technical",
                business: "Business"
            };
            const specializationLabels = {
                cybersecurity: "Cybersecurity",
                software: "Software Engineering",
                data_science: "Data Science"
            };
            const languageLabels = {
                arabic: "Arabic",
                english: "English",
                bilingual: "Bilingual"
            };

            const setup = {
                name: document.querySelector('#firstName')?.value.trim() || "فهد",
                company: companyLabels[getCheckedValue('company', 'aramco')] || "Aramco",
                track: trackLabels[getCheckedValue('track', 'technical')] || "Technical",
                specialization: specializationLabels[getCheckedValue('sub_track', 'software')] || "Software Engineering",
                interviewLanguage: languageLabels[getCheckedValue('language', 'bilingual')] || "Bilingual"
            };

            window.localStorage.setItem('interviewSetup', JSON.stringify(setup));
            window.location.href = '/interview';
        }

        // Simple script to handle custom radio button styles if needed beyond CSS peer classes
        // Currently handled purely by CSS peer-checked, keeping it lightweight as requested.
        document.addEventListener('DOMContentLoaded', () => {
            const inputs = document.querySelectorAll('input[type="radio"]');
            inputs.forEach(input => {
                input.addEventListener('change', (e) => {
                    // Trigger a tiny subtle animation on the container when selection changes
                    const container = e.target.closest('fieldset');
                    container.classList.add('scale-[0.99]');
                    setTimeout(() => container.classList.remove('scale-[0.99]'), 150);
                });
            });
        });
    </script>
